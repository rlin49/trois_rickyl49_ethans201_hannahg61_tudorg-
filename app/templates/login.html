<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" type="text/css" href="/static/css/style.css">
</head>

<body class="bg-gray-100">

  <div class="flex items-center justify-center min-h-screen px-4">
    <div class="w-full max-w-md">

      <div class="bg-[#fdfdfd] shadow-lg rounded-xl p-8">

        <h1 class="text-2xl font-bold text-center mb-3 text-[#1f3b4d]">
          Login
        </h1>

        <p class="text-center mb-6 text-[#5a6a7a]">
          Enter your username and password to access your account
        </p>

        <form method="POST" action="/login">

          {% if error %}
          <div class="bg-red-100 text-red-700 px-4 py-2 rounded mb-4">
            {{ error }}
          </div>
  
          {% endif %}

          <div class="mb-4">
            <label for="username" class="block mb-1 font-medium text-[#1f3b4d]">
              Username
            </label>
            <input 
              type="text" 
              id="username" 
              name="username" 
              required
              class="w-full px-3 py-2 border border-[#c1cdd9] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#3a7ca5]"
            >
          </div>

          <div class="mb-4">
            <label for="password" class="block mb-1 font-medium text-[#1f3b4d]">
              Password
            </label>
            <input 
              type="password" 
              id="password" 
              name="password" 
              required
              class="w-full px-3 py-2 border border-[#c1cdd9] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#3a7ca5]"
            >
          </div>

          <div>
            <button 
              type="submit"
              class="w-full bg-[#3a7ca5] text-white font-medium py-2 rounded-lg hover:bg-[#326c8f] transition"
            >
              Login
            </button>
          </div>

        </form>

        <div class="mt-4 text-center">
          <a 
            href="/register.html"
            class="inline-block border border-gray-400 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-200 transition"
          >
            Register
          </a>
        </div>

        <div class="mt-4 text-center">
          <a 
            href="/homepage"
            class="inline-block border border-gray-400 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-200 transition"
          >
            Continue as guest
          </a>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
