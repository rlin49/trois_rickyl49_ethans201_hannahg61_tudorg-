<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js" integrity="sha512-Y51n9mtKTVBh3Jbx5pZSJNDDMyY+yGe77DGtBPzRlgsf/YLCh13kSZ3JmfHGzYFCmOndraf0sQgfM654b7dJ3w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- NAVBAR -->
<nav class="w-full flex items-center justify-between p-4 border-b bg-gray-100">

  <div class="font-bold text-lg">
    Game Guessing App
  </div>

  <div class="flex gap-4 items-center">

    <a href="/homepage" class="px-3 py-1 border rounded hover:bg-gray-200">
      Home
    </a>

    <a href="/search" class="px-3 py-1 border rounded hover:bg-gray-200">
      Search
    </a>

    <a href="/game" class="px-3 py-1 border rounded hover:bg-gray-200">
      Exit Game
    </a>

    <a href="/logout" class="px-3 py-1 border rounded bg-red-200 hover:bg-red-300">
      Logout
    </a>

  </div>
</nav>

<!-- CHART -->
<div class="w-[50%] p-5">
  <canvas id="chart"></canvas>
</div>

<!-- GAME INFO -->
<div class="w-full pl-5 pr-5">
<br>
<b>{{ game_name }}</b> #{{ rank }}
<br>
Platform: {{ platform }}
<br>
Year: {{ year }}
<br>
Genre: {{ genre }}
<br>
Publisher: {{ publisher }}
<br>
Metacritic Score: {{ rating }}
<br>
Description: {{ description | safe }}

<br><br>
</div>

<!-- FORM -->
<form action="/game" method="POST" class="pl-5">
  How many units do you think this game sold? (in millions)
  <input class="border-2 p-1" type="number" name="guessed_sales" min="0" max="1000000" step="any">

  <input type="hidden" name="game_index" value={{game_index}}>
  <input type="hidden" name="guess_arr" value={{guess_arr}}>
  <input type="hidden" name="ans_arr" value={{ans_arr}}>
  <input type="hidden" name="game_arr" value='{{ game_arr }}'>

  <input type="submit" class="border-2 p-1">
</form>

<!-- CHART SCRIPT -->
<script>
  const ctx = document.querySelector("#chart");

  var guess_arr = "{{guess_arr}}";
  var ans_arr = "{{ans_arr}}";
  var game_arr = "{{game_arr}}";

  const labels = game_arr ? game_arr.split(";") : [];

  const data = {
    labels: labels,
    datasets: [
      {
        label: "Guesses",
        data: guess_arr ? guess_arr.split(";") : [],
        backgroundColor: "rgba(59, 130, 246, 0.6)"
      },
      {
        label: "Real Answers",
        data: ans_arr ? ans_arr.split(";") : [],
        backgroundColor: "rgba(34, 197, 94, 0.6)"
      }
    ]
  };

  const chart = new Chart(ctx, {
    type: 'bar',
    data: data,
    options: {
      indexAxis: 'y', // horizontal bar chart
      responsive: true,
      scales: {
        x: {
          beginAtZero: true,
          title: {
            display: true,
            text: 'Sales (millions)'
          }
        },
        y: {
          ticks: {
            autoSkip: false
          }
        }
      }
    }
  });
</script>
