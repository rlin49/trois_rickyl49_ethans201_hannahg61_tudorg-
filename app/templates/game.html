<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>

<div class="w-[50%] p-5">
  <canvas id="chart"></canvas>
</div>

<script>
  const ctx = document.getElementById("chart").getContext("2d");

  const guess_arr = "{{ guess_arr }}".split(";").map(Number);
  const ans_arr = "{{ ans_arr }}".split(";").map(Number);
  const labels = "{{ game_arr }}".split(";");

  const data = {
    labels,
    datasets: [
      // 🔴 BIGGER VALUE (background layer)
      {
        label: "Real Answers",
        data: ans_arr,
        backgroundColor: "rgba(255, 99, 132, 0.25)",
        borderColor: "rgba(255, 99, 132, 1)",
        borderWidth: 1,
        order: 2,
        grouped: false
      },

      // 🔵 GUESS (always on top visually)
      {
        label: "Guesses",
        data: guess_arr,
        backgroundColor: "rgba(54, 162, 235, 1)",
        borderColor: "rgba(54, 162, 235, 1)",
        borderWidth: 2,
        order: 1,
        grouped: false
      }
    ]
  };

  new Chart(ctx, {
    type: "bar",
    data,
    options: {
      indexAxis: "y",
      responsive: true,
      scales: {
        x: {
          beginAtZero: true
        },
        y: {
          ticks: {
            autoSkip: false
          }
        }
      }
    }
  });
</script>
