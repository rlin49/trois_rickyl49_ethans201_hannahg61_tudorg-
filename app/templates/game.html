<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>

<div class="w-[50%] p-5">
  <canvas id="chart"></canvas>
</div>

<script>
  const ctx = document.querySelector("#chart").getContext("2d");

  const guess_arr = "{{ guess_arr }}".split(";").map(Number);
  const ans_arr = "{{ ans_arr }}".split(";").map(Number);
  const labels = "{{ game_arr }}".split(";");

  const data = {
    labels,
    datasets: [
      // 🔴 REAL ANSWERS (background)
      {
        label: "Real Answers",
        data: ans_arr,
        backgroundColor: "rgba(255, 99, 132, 1)",
        borderColor: "rgba(255, 99, 132, 1)",
        borderWidth: 1,
        grouped: false,
        order: 1
      },

      // 🔵 GUESSES (on top)
      {
        label: "Guesses",
        data: guess_arr,
        backgroundColor: "rgba(54, 162, 235, 1)",
        borderColor: "rgba(54, 162, 235, 1)",
        borderWidth: 2,
        grouped: false,
        order: 2
      }
    ]
  };

  new Chart(ctx, {
    type: "bar",
    data,
    options: {
      indexAxis: "y",
      responsive: true,
      plugins: {
        tooltip: { mode: "index" },
        legend: { position: "top" }
      },
      scales: {
        x: {
          beginAtZero: true
        },
        y: {
          ticks: {
            autoSkip: false
          }
        }
      }
    }
  });
</script>
