<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js" integrity="sha512-Y51n9mtKTVBh3Jbx5pZSJNDDMyY+yGe77DGtBPzRlgsf/YLCh13kSZ3JmfHGzYFCmOndraf0sQgfM654b7dJ3w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


<div class="w-[50%] p-5">
  <canvas id = "chart"></canvas>
</div>

<div class = "w-full pl-5 pr-5">
<br>
<b>{{ game_name }}</b> #{{ rank }}
<br>
Platform: {{ platform }}
<br>
Year: {{ year }}
<br>
Genre: {{ genre }}
<br>
Publisher: {{ publisher }}
<br>
Metacritic Score: {{ rating }}
<br>
Description: {{ description | safe }}

<br><br>
</div>


<form action = "/game" method = "POST" class = "pl-5">
How many units do you think this game sold? (in millions) <input class="border-2 p-1" type = "number" name="guessed_sales" min="0" max="1000000" step="any">
<input type = "hidden" name = "game_index" value = {{game_index}}>
<input type = "hidden" name = "guess_arr" value = {{guess_arr}}>
<input type = "hidden" name = "ans_arr" value = {{ans_arr}}>
<input type = "hidden" name = "game_arr" value = '{{ game_arr }}'>
<input type = "submit" class="border-2 p-1">

</form>





<script>

  const ctx = document.querySelector("#chart");
  var guess_arr = "{{guess_arr}}";
  var ans_arr = "{{ans_arr}}";
  var game_arr = "{{game_arr}}";

  console.log(guess_arr.split(";"));
  console.log(ans_arr.split(";"));
  console.log(game_arr.split(";"));

  const labels = game_arr.split(";");
  const data = {
    labels: labels,
    datasets: [{
      label: "Guesses",
      data: guess_arr.split(";"),
    },
    {
      label: "Real Answers",
      data: ans_arr.split(";")
    }
    ]
  };

  const chart = new Chart (
    ctx,
    {
      type: 'line',
      data: data,
      options: {
      scales: {
         x: {
            ticks: {
               minRotation: 75
            }
         },
      },

   }
    }

  )


</script>
