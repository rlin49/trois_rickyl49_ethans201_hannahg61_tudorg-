<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>

<div class="w-[50%] p-5">
  <canvas id="chart"></canvas>
</div>

<script>
  const ctx = document.getElementById("chart").getContext("2d");

  const guess_arr = "{{ guess_arr }}".split(";").map(Number);
  const ans_arr = "{{ ans_arr }}".split(";").map(Number);
  const labels = "{{ game_arr }}".split(";");

  // Compute per-category layering
  const minVals = guess_arr.map((g, i) => Math.min(g, ans_arr[i]));
  const maxVals = guess_arr.map((g, i) => Math.max(g, ans_arr[i]));

  const data = {
    labels,
    datasets: [
      {
        label: "Larger Value",
        data: maxVals,
        backgroundColor: "rgba(180, 180, 180, 0.35)",
        borderColor: "rgba(120, 120, 120, 1)",
        borderWidth: 1,
        order: 2,
        barThickness: 14
      },
      {
        label: "Smaller Value",
        data: minVals,
        backgroundColor: "rgba(54, 162, 235, 0.9)",
        borderColor: "rgba(54, 162, 235, 1)",
        borderWidth: 1,
        order: 1,
        barThickness: 14
      }
    ]
  };

  new Chart(ctx, {
    type: "bar",
    data,
    options: {
      indexAxis: "y",
      responsive: true,
      scales: {
        x: {
          beginAtZero: true
        },
        y: {
          ticks: {
            autoSkip: false
          }
        }
      },
      plugins: {
        legend: {
          position: "top"
        }
      }
    }
  });
</script>
