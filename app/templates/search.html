<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<body class="min-h-screen bg-[radial-gradient(circle_at_top,_#1f2937,_#030712)] text-gray-100">

<nav class="bg-red-700 border-b border-red-900">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">

    <a href="/game" class="text-lg font-semibold text-gray-50">
      GAME
    </a>

    <ul class="flex space-x-4">
        <a href="/homepage" class="text-gray-50 hover:text-black">
          Home
        </a>
    </ul>
    <ul class="flex space-x-4">
        <a href="/search" class="text-gray-50 hover:text-black">
          Search
        </a>
    </ul>

    {% if logged_in == True %}
    <ul class="flex space-x-4">
        <a href="/profile/{{ username }}" class="text-gray-50 hover:text-black">
          Profile
        </a>
    </ul>
    <a href="/logout"
       class="text-sm border border-gray-50 text-gray-50 px-3 py-1 rounded hover:bg-gray-200 hover:text-black">
       Logout
    </a>
    {% else %}
    <a href="/login.html"
       class="text-sm border border-gray-50 text-gray-50 px-3 py-1 rounded hover:bg-gray-200 hover:text-black">
       Log In
    </a>
    {% endif %}

  </div>
</nav>

<div class="flex justify-center items-center mt-10">
<div id="game-info" class="pl-5 pt-2 pr-2 w-full max-w-4xl">

<div class="text-center px-4">
  <h1 class="text-3xl font-bold mb-6">
    Search for one of our many games here
  </h1>
</div>

{% if searching %}
  <div class="bg-gray-900 border border-gray-700 shadow-2xl rounded-xl p-6 max-w-xl mx-auto">
    <form action="/search" method="GET" class="text-center">
      <label class="block mb-2 text-gray-200">
        Enter Game Name:
      </label>

      <input type="text" name="game_name"
             class="w-full bg-gray-800 border border-gray-600 text-gray-100 p-2 rounded mb-4 focus:outline-none focus:ring-2 focus:ring-red-500">

      <input type="submit"
             class="bg-red-600 px-4 py-2 rounded text-white hover:bg-red-700 cursor-pointer">
    </form>
  </div>
{% else %}
 <div class="p-4 bg-gray-900 border border-gray-700 shadow-2xl rounded-xl">
  {{ games | safe }}
 </div>
{% endif %}

</div>
</div>

</body>
