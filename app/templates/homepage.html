<!DOCTYPE html>
<html>
<head>
  <title>Homepage</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>

<body class="min-h-screen bg-[radial-gradient(circle_at_top,_#1f2937,_#030712)] text-gray-100">

<nav class="bg-red-700 border-b border-red-900">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">

    <a href="/game" class="text-lg font-semibold text-gray-50">
      GAME
    </a>

    <ul class="flex space-x-4">
        <a href="/homepage" class="text-gray-50 hover:text-black">
          Home
        </a>
    </ul>
    <ul class="flex space-x-4">
        <a href="/search" class="text-gray-50 hover:text-black">
          Search
        </a>
    </ul>

    {% if logged_in == True %}
    <ul class="flex space-x-4">
        <a href="/profile/{{ username }}" class="text-gray-50 hover:text-black">
          Profile
        </a>
    </ul>
    <a href="/logout"
       class="text-sm border border-gray-50 text-gray-50 px-3 py-1 rounded hover:bg-gray-200 hover:text-black">
       Logout
    </a>
    {% else %}
    <a href="/login.html"
       class="text-sm border border-gray-50 text-gray-50 px-3 py-1 rounded hover:bg-gray-200 hover:text-black">
       Log In
    </a>
    {% endif %}

  </div>
</nav>

<div class="max-w-4xl mx-auto mt-12 text-center px-4">

  <h1 class="text-3xl font-bold mb-4">
    Welcome, {{ username }}
  </h1>

  <div class="bg-gray-900 border border-gray-700 shadow-2xl rounded-lg mx-auto mb-6 max-w-xl">
    <div class="p-6">
      <p>
        Top Ranked Games: <br>
        {{ game_ranking | safe }}
      </p>
    </div>
  </div>

  <div class="bg-gray-800 border border-gray-700 shadow-2xl rounded-lg mx-auto mb-6 max-w-xl">
    <div class="p-6">
      <p>
        Lowest Ranked Games: <br>
        {{ bad_ranking | safe }}
      </p>
    </div>
  </div>

</div>

<div class="max-w-4xl mx-auto mt-12 text-center px-4">
  <div class="bg-gray-900 border border-gray-700 shadow-2xl rounded-lg mx-auto mb-6 max-w-xl">
    <div class="p-6">
      <p>
        Personal Recommendations: <br>
        <div class="text-blue-400">
          <a href="/gamepage/25" class="hover:underline">Pokemon Black & White</a><br>
        </div>
      </p>
    </div>
  </div>
</div>

<div class="max-w-4xl mx-auto mt-12 text-center px-4">
  All Game Ratings:
</div>

<canvas id="chart" class="h-[80%] w-[90%] pl-[5%] pr-[5%]"></canvas>

<script>
const ctx = document.querySelector("#chart").getContext("2d");

const arr = "{{ full_ratings }}".split(";").map(Number);

const ratings = [];
const labels = [];

for(let i = 0; i < 101; i++)
{
    labels.push(i);
    ratings.push(arr.filter((x) => x == i).length)
}

const data = {
  labels: labels,
  datasets: [
    {
      label: "Number of Ratings",
      data: ratings,
      backgroundColor: "rgba(59, 130, 246, 0.6)",
      borderColor: "rgba(59, 130, 246, 1)",
      borderWidth: 1
    }
  ]
};

const chart = new Chart(ctx, {
  type: "bar",
  data: data,
  options: {
    indexAxis: "x",
    responsive: true,
    plugins: {
      legend: {
        labels: {
          color: "#f3f4f6"
        }
      }
    },
    scales: {
      x: {
        beginAtZero: true,
        ticks: { color: "#f3f4f6" },
        grid: { color: "rgba(255,255,255,0.1)" }
      },
      y: {
        ticks: { color: "#f3f4f6", autoSkip: false },
        grid: { color: "rgba(255,255,255,0.1)" }
      }
    }
  }
});
</script>

<div class="text-center text-red-400 mt-4">
  {{ error }}
</div>

</body>
</html>
