<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Register</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="/static/css/style.css">
</head>

<body class="bg-light">

  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-10 col-lg-5">
        <div class="card shadow" style="border-radius: 15px; border: none; background-color: #fdfdfd; padding: 2rem;">
          <div class="card-body">

            <h1 class="text-center mb-3" style="color: #1f3b4d;">Create an Account</h1>
            <p class="text-center mb-4 text-muted" style="color: #5a6a7a;">
              Enter your username, and password below:
            </p>

            <!-- register -->
            <form method="POST" action="/register">

              {% if error %}
              <div class="alert alert-danger" role="alert">
                {{ error }}
              </div>
              {% endif %}

              <div class="mb-3">
                <label for="username" class="form-label" style="font-weight: 500; color: #1f3b4d;">Username</label>
                <input type="text" class="form-control" id="username" name="username" required
                    style="border-radius: 10px; border-color: #c1cdd9;">
              </div>

              <div class="mb-3">
                <label for="password" class="form-label" style="font-weight: 500; color: #1f3b4d;">Password</label>
                <input type="password" class="form-control" id="password" name="password" required
                    style="border-radius: 10px; border-color: #c1cdd9;">
              </div>

              <div class="mb-3">
                <label for="confirm" class="form-label" style="font-weight: 500; color: #1f3b4d;">Confirm Password</label>
                <input type="password" class="form-control" id="confirm" name="confirm" required
                    style="border-radius: 10px; border-color: #c1cdd9;">
              </div>

              <div class="d-grid">
                <button type="submit" class="btn" style="background-color: #3a7ca5; color: #fff; font-weight: 500;">
                  Register
                </button>
              </div>
            </form>

            <div class="mt-3 text-center">
              <a href="/login" class="btn btn-outline-secondary" style="border-radius: 10px;">
                Already have an account? Login
              </a>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
